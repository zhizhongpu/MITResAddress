name: Checks

on:
  push:
    branches:
      - "**"
  issue_comment:
    types: [created]

jobs:
  checks:
    if: |
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-actions-all]')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/run-actions-'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      statuses: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.sha }}

      - name: Post pending commit status
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_SHA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.sha')
          echo "PR_SHA=$PR_SHA" >> $GITHUB_ENV
          gh api repos/${{ github.repository }}/statuses/$PR_SHA \
            -f state=pending \
            -f context="Checks" \
            -f description="Running..." \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - id: check_scons
        name: Check SCons DAG for missing dependencies
        if: github.event_name == 'push' || contains(github.event.comment.body, '/run-actions-dag') || contains(github.event.comment.body, '/run-actions-all')
        continue-on-error: true
        uses: ./.github/actions/timed-check
        with:
          script: .github/check_sconscripts.py

      - id: check_newlines
        name: Check missing newlines
        if: github.event_name == 'push' || contains(github.event.comment.body, '/run-actions-newlines') || contains(github.event.comment.body, '/run-actions-all')
        continue-on-error: true
        uses: ./.github/actions/timed-check
        with:
          script: .github/check_newlines.py

      - id: check_eps
        name: Check extraneous EPS data
        if: github.event_name == 'push' || contains(github.event.comment.body, '/run-actions-eps') || contains(github.event.comment.body, '/run-actions-all')
        continue-on-error: true
        uses: ./.github/actions/timed-check
        with:
          script: .github/check_eps_savefig.py

      - id: check_scons_log
        name: Check build failure
        if: github.event_name == 'push' || contains(github.event.comment.body, '/run-actions-log') || contains(github.event.comment.body, '/run-actions-all')
        continue-on-error: true
        uses: ./.github/actions/timed-check
        with:
          script: .github/check_sconscript_log.py

      - name: Report runtime
        if: always()
        run: |
          echo "check_scons:     ${{ steps.check_scons.outputs.time }}s"
          echo "check_newlines:  ${{ steps.check_newlines.outputs.time }}s"
          echo "check_eps:       ${{ steps.check_eps.outputs.time }}s"
          echo "check_scons_log: ${{ steps.check_scons_log.outputs.time }}s"

      - name: Post PR comment and commit status
        if: always() && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          icon() { [[ "$1" == "success" ]] && echo "pass" || [[ "$1" == "skipped" ]] && echo "skip" || echo "FAIL"; }
          scons_icon=$(icon "${{ steps.check_scons.outcome }}")
          newlines_icon=$(icon "${{ steps.check_newlines.outcome }}")
          eps_icon=$(icon "${{ steps.check_eps.outcome }}")
          log_icon=$(icon "${{ steps.check_scons_log.outcome }}")

          gh pr comment ${{ github.event.issue.number }} --body "**Check Results** ([run details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))

          | Check | Result | Time |
          |-------|--------|------|
          | SCons DAG | $scons_icon | ${{ steps.check_scons.outputs.time }}s |
          | Newlines | $newlines_icon | ${{ steps.check_newlines.outputs.time }}s |
          | EPS data | $eps_icon | ${{ steps.check_eps.outputs.time }}s |
          | Build log | $log_icon | ${{ steps.check_scons_log.outputs.time }}s |"

          failed=()
          [[ "${{ steps.check_scons.outcome }}"     == "failure" ]] && failed+=("check_scons")
          [[ "${{ steps.check_newlines.outcome }}"  == "failure" ]] && failed+=("check_newlines")
          [[ "${{ steps.check_eps.outcome }}"       == "failure" ]] && failed+=("check_eps")
          [[ "${{ steps.check_scons_log.outcome }}" == "failure" ]] && failed+=("check_scons_log")

          if [[ ${#failed[@]} -gt 0 ]]; then
            STATE=failure
            DESC="Failed: ${failed[*]}"
          else
            STATE=success
            DESC="All checks passed"
          fi

          gh api repos/${{ github.repository }}/statuses/$PR_SHA \
            -f state=$STATE \
            -f context="Checks" \
            -f description="$DESC" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail if any check failed
        if: always()
        run: |
          failed=()
          [[ "${{ steps.check_scons.outcome }}"     == "failure" ]] && failed+=("check_scons")
          [[ "${{ steps.check_newlines.outcome }}"  == "failure" ]] && failed+=("check_newlines")
          [[ "${{ steps.check_eps.outcome }}"       == "failure" ]] && failed+=("check_eps")
          [[ "${{ steps.check_scons_log.outcome }}" == "failure" ]] && failed+=("check_scons_log")
          if [[ ${#failed[@]} -gt 0 ]]; then echo "Failed checks: ${failed[*]}"; exit 1; fi
