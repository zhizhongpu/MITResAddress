name: Check issue/ is empty

on:
  pull_request:
    branches: [main, master]
    types: [opened, labeled]

jobs:
  check-issue:
    if: github.event.action == 'opened' || github.event.label.name == 'ready-to-merge' || github.event.label.name == 'bypass-issue-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if issue/ is non-empty
        run: |
          if [ "${{ github.event.label.name }}" = "bypass-issue-check" ]; then
            echo "Check bypassed via label."
            exit 0
          fi
          if [ -d "issue" ] && [ -n "$(ls -A issue/)" ]; then
            echo "issue/ is not empty. Please delete its contents before merging."
            exit 1
          fi
          echo "issue/ is empty or does not exist."
