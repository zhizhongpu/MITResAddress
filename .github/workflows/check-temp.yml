name: Check temp/ is empty

on:
  pull_request:
    branches: [main, master]
    types: [labeled]

jobs:
  check-temp:
    if: github.event.label.name == 'ready-to-merge'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if temp/ is non-empty
        run: |
          if [ -d "temp" ] && [ -n "$(ls -A temp/)" ]; then
            echo "temp/ is not empty. Please delete its contents before merging."
            exit 1
          fi
          echo "temp/ is empty or does not exist."
