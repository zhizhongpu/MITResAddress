# Post a comment when a PR is closed (merged or unmerged)

name: PR Close Comment

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Comment on PR close
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const pr = context.payload.pull_request;
          const prNumber = pr.number;
          const wasMerged = pr.merged;
          const branchName = pr.head.ref;
          const lastCommitSha = pr.head.sha;
          
          // Extract issue number from branch name (first contiguous integer)
          const issueMatch = branchName.match(/^(\d+)/);
          const issueNumber = issueMatch ? issueMatch[1] : null;
          
          // Parse issue references from PR body
          const prBody = pr.body || '';
          const issueRefs = [];
          const issuePatterns = [
            /(?:fix(?:es|ed)?|close(?:s|d)?|resolve(?:s|d)?)\s+#(\d+)/gi,
            /#(\d+)/g
          ];
          
          for (const pattern of issuePatterns) {
            let match;
            while ((match = pattern.exec(prBody)) !== null) {
              const num = match[1];
              if (!issueRefs.includes(num)) {
                issueRefs.push(num);
              }
            }
          }
          
          // Get PR reviewers for tagging
          const reviewers = [];
          try {
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            const uniqueReviewers = new Set();
            reviews.data.forEach(review => {
              if (review.user && review.user.login !== pr.user.login) {
                uniqueReviewers.add(review.user.login);
              }
            });
            reviewers.push(...uniqueReviewers);
          } catch (error) {
            console.log(`Could not fetch reviewers: ${error.message}`);
          }
          
          let issueCommentUrl = null;
          
          // Post to issue thread first
          if (issueNumber) {
            try {
              // Read the issue thread message template
              let issueCommentBody;
              try {
                issueCommentBody = fs.readFileSync('.github/post_template_issue_thread_pr_close.md', 'utf8');
              } catch (error) {
                issueCommentBody = 'PR has been closed.';
              }
              
              const issueComment = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber),
                body: issueCommentBody
              });
              
              issueCommentUrl = issueComment.data.html_url;
              console.log(`Posted to issue #${issueNumber}: ${issueCommentUrl}`);
            } catch (error) {
              console.log(`Could not comment on issue #${issueNumber}: ${error.message}`);
            }
          }
          
          // Create PR comment
          const prUser = pr.user.login;
          const reviewerTags = reviewers.length > 0 ? reviewers.map(r => `@${r}`).join(' ') : '';
          
          let prCommentBody = `@${prUser} Thanks for closing the PR. I've deleted this issue branch for you.
          
You need to:
- [ ] edit the last post in the issue thread
- [ ] update \`main\` to other issue branches  
- [ ] update the datastore in the cloud

If you have questions, please ask by tagging the reviewers of this PR${reviewerTags ? `: ${reviewerTags}` : ''}`;

          // Add issue thread link if available
          if (issueCommentUrl) {
            prCommentBody += `\n\n📝 [Issue thread updated here](${issueCommentUrl})`;
          }
          
          // Post comment on PR
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: prCommentBody
          });
          
          // Delete branch (both merged and unmerged cases)
          try {
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branchName}`
            });
            console.log(`Branch ${branchName} deleted successfully`);
          } catch (error) {
            console.log(`Could not delete branch ${branchName}: ${error.message}`);
          }