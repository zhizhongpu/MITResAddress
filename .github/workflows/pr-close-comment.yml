# Post a comment when a PR is closed (merged or unmerged)

name: PR Close Comment

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
    - name: Comment on PR close
      uses: actions/github-script@v7
      with:
        script: |
          const pr = context.payload.pull_request;
          const prNumber = pr.number;
          const wasMerged = pr.merged;
          const branchName = pr.head.ref;
          const lastCommitSha = pr.head.sha;
          
          // Extract issue number from branch name (first contiguous integer)
          const issueMatch = branchName.match(/^(\d+)/);
          const issueNumber = issueMatch ? issueMatch[1] : null;
          
          // Parse issue references from PR body
          const prBody = pr.body || '';
          const issueRefs = [];
          const issuePatterns = [
            /(?:fix(?:es|ed)?|close(?:s|d)?|resolve(?:s|d)?)\s+#(\d+)/gi,
            /#(\d+)/g
          ];
          
          for (const pattern of issuePatterns) {
            let match;
            while ((match = pattern.exec(prBody)) !== null) {
              const num = match[1];
              if (!issueRefs.includes(num)) {
                issueRefs.push(num);
              }
            }
          }
          
          // Build comment body
          let commentBody;
          if (wasMerged) {
            const merger = pr.merged_by ? `@${pr.merged_by.login}` : 'someone';
            commentBody = `The PR is closed (merged) by ${merger}`;
          } else {
            commentBody = "The PR is closed (unmerged)";
          }
          
          // Add last commit info
          commentBody += `\n\nLast commit: \`${lastCommitSha.substring(0, 7)}\``;
          
          // Add issue links if found
          if (issueRefs.length > 0) {
            const issueLinks = issueRefs.map(num => `#${num}`).join(', ');
            commentBody += `\n\nRelated issues: ${issueLinks}`;
          }
          
          // Post comment on PR
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: commentBody
          });
          
          // Post test comment to linked issues
          if (issueNumber) {
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber),
                body: `Test comment: PR #${prNumber} was ${wasMerged ? 'merged' : 'closed'}`
              });
            } catch (error) {
              console.log(`Could not comment on issue #${issueNumber}: ${error.message}`);
            }
          }
          
          // Delete branch (both merged and unmerged cases)
          try {
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branchName}`
            });
            console.log(`Branch ${branchName} deleted successfully`);
          } catch (error) {
            console.log(`Could not delete branch ${branchName}: ${error.message}`);
          }