name: Bypass issue/ check

on:
  issue_comment:
    types: [created]

jobs:
  bypass:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/bypass-issue-check')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add bypass label to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels \
            --method POST \
            -f "labels[]=bypass-issue-check"
