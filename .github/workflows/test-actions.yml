name: Tests

on:
  push:
    branches:
      - "**"

jobs:
  lint:
    if: contains(github.event.head_commit.message, '[github-actions]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - id: scons
        name: Run SCons checker
        continue-on-error: true
        run: python .github/check_sconscripts.py

      - id: newlines
        name: Add newlines when needed
        continue-on-error: true
        run: python .github/add_newlines.py --fix yes
