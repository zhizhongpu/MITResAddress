name: Tests

on:
  push:
    branches:
      - "**"

  checks:
    if: contains(github.event.head_commit.message, '[github-actions]')
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - id: scons
        name: Run SCons checker
        continue-on-error: true
        run: python .github/check_sconscripts.py

      - id: newlines
        name: Add newlines when needed
        continue-on-error: true
        run: python .github/check_newlines.py 

      - id: eps_check
        name: Check EPS savefig usage
        continue-on-error: true
        run: python .github/check_eps_savefig.py

      - id: scons_log
        name: Check for failed scons builds
        continue-on-error: true
        run: python .github/check_sconscript_log.py
