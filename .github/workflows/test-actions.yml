name: Tests

on:
  push:
    branches:
      - "**"

jobs:
  lint:
    if: contains(github.event.head_commit.message, '[github-actions]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - id: scons
        name: Run SCons checker
        continue-on-error: true
        run: python .github/check_sconscripts.py

      - id: pylint
        name: Run pylint (Python files excluding source/lib)
        continue-on-error: true
        run: |
          echo "Installing pylint..."
          if ! python -m pip install --upgrade pip pylint >/dev/null 2>pip_install.log; then
            echo "❌ pip install failed:"; cat pip_install.log
          fi
          find source/ -type f -name "*.py" \
            ! -path "./source/lib/*" ! -path "./.github/*" -print0 \
            | xargs -0 pylint --rcfile=source/lib/linter_config/.pylintrc || true

